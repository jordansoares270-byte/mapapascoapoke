            overflow-y: auto;

            border-bottom: 1px solid #5a5a7a;
            padding-bottom: 6px;

        }
        .num-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #cc0000;
            border-radius: 30px;
            margin-bottom: 4px;
            overflow: hidden;
        }
        .num-btn {

            font-size: 1rem;
            padding: 5px 0;
            text-align: center;
            cursor: pointer;
        }

            background-color: #660000;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .delete-btn:hover { background-color: #aa0000; }
        .map-wrapper {
            flex: 1;
            position: relative;
            background: #0a0a12;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #mapImageContainer {
            position: relative;
            display: inline-block;
            max-width: 100%;
            height: auto;
        }
        .floor-image {
            max-width: 100%;
            height: auto;
            display: none;
            cursor: crosshair;
            border: 2px solid #3a3a5a;
        }
        .floor-image.active { display: block; }
        .marker-on-image {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: #ff0000;
            color: white;
            font-weight: bold;
            font-size: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 0 0 2px black;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        .marker-on-image.hidden-marker { display: none; }

            background: #0f0f1a;
            padding: 5px 15px;
            font-size: 12px;
            font-family: monospace;

            font-size: 0.75rem;
            margin-left: auto;
